<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理随笔 · Physics Notes</title>
<meta name="description" content="用文字丈量宇宙的边界 — 物理科普随笔">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='none' stroke='%23222' stroke-width='1.5'/><circle cx='16' cy='16' r='3' fill='%23222'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#fdfdfb;
  --text:#1b1b1b;
  --muted:#6e6e6e;
  --faint:#9a9a96;
  --rule:#e4e2db;
  --link:#14507d;
}

html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"Newsreader","Noto Serif SC",Georgia,"Times New Roman",serif;
  font-size:19px;
  line-height:1.75;
  font-weight:400;
}

.wrap{max-width:680px;margin:0 auto;padding:0 24px 120px}

a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}

::selection{background:#dce8f1}

/* ── Masthead ── */
.masthead{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:66px 0 20px;border-bottom:1px solid var(--rule);margin-bottom:52px;
  flex-wrap:wrap;gap:10px 24px;
}
.brand .site-title{
  font-size:22px;font-weight:600;letter-spacing:.2px;line-height:1.3;
}
.brand .site-title a{color:var(--text)}
.brand .site-title a:hover{text-decoration:none;color:var(--link)}
.brand .tagline{
  display:block;font-size:14.5px;color:var(--muted);font-style:italic;
  font-weight:400;margin-top:3px;
}
.nav{font-size:15px}
.nav a{color:var(--muted);letter-spacing:.3px}
.nav a:hover{color:var(--link)}

/* ── Post list ── */
.post-list{list-style:none}
.post-item{padding:26px 0;border-bottom:1px solid var(--rule)}
.post-item:first-child{padding-top:0}
.post-meta{
  font-size:13px;color:var(--faint);letter-spacing:.6px;
  font-variant-numeric:tabular-nums;text-transform:uppercase;
}
.post-title{font-size:24px;font-weight:600;line-height:1.32;margin:5px 0 7px;letter-spacing:-.1px}
.post-title a{color:var(--text)}
.post-title a:hover{color:var(--link);text-decoration:none}
.post-excerpt{font-size:16.5px;color:var(--muted);line-height:1.62}

.empty{padding:60px 0;color:var(--faint);font-style:italic;text-align:center}

/* ── Article ── */
.back{display:inline-block;font-size:15px;color:var(--muted);margin:6px 0 40px}
.back:hover{color:var(--link);text-decoration:none}
.article-title{
  font-size:35px;font-weight:600;line-height:1.24;letter-spacing:-.3px;margin-bottom:16px;
}
.article-meta{
  font-size:13.5px;color:var(--faint);letter-spacing:.6px;text-transform:uppercase;
  padding-bottom:26px;margin-bottom:40px;border-bottom:1px solid var(--rule);
}
.article-body{font-size:19px;line-height:1.88;color:#252525}
.article-body p{margin-bottom:1.5em}
.article-body p:last-child{margin-bottom:0}
.article-tags{
  margin-top:52px;padding-top:24px;border-top:1px solid var(--rule);
  font-size:14px;color:var(--muted);
}
.article-tags .label{color:var(--faint);margin-right:8px}
.article-tags a{color:var(--muted)}
.article-tags a:hover{color:var(--link)}

/* ── Footer ── */
footer{
  margin-top:84px;padding-top:26px;border-top:1px solid var(--rule);
  font-size:13px;color:var(--faint);letter-spacing:.5px;text-align:center;
}

@media(max-width:560px){
  body{font-size:18px}
  .masthead{padding-top:48px}
  .article-title{font-size:29px}
  .article-body{font-size:18px}
}
</style>
</head>
<body>

<div class="wrap" id="app"></div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ── Blog posts ──
   Long-form essays. Replace these with your own.
   body: separate paragraphs with a blank line (\n\n). */
const POSTS = [
  {
    id:"b1", date:"2026-06-09",
    title:"中心极限定理，其实是最简单的重整化群",
    tags:["重整化群","中心极限定理","普适性"],
    body:`钟形曲线无处不在。考试分数、测量误差、分子速率、股票每日涨跌——只要你把足够多的随机因素加在一起，结果的分布几乎总是那条对称的高斯钟形线。这就是中心极限定理：取 N 个独立同分布、且方差有限的随机变量，求和、减去均值、再除以 √N，当 N 趋于无穷，得到的分布必然收敛到高斯分布。最惊人的是它的「健忘」——原始变量长什么样根本不重要，骰子也好、硬币也罢、任何古怪的分布，最后都磨成同一条钟形线。只有均值和方差幸存，其余的微观细节统统被冲刷干净。

为什么会这样？答案藏在二十世纪物理学最深刻的思想之一里：重整化群。

让我们换个角度看中心极限定理。定义一个作用在「概率分布空间」上的变换 R：取两个独立的同分布副本，把它们相加（在概率上就是做一次卷积），再把结果整体压缩 1/√2 倍，好让方差保持不变。然后一次次重复这个操作。仔细看——这正是「粗粒化 + 重标度」的结构，和物理学家对一块磁体反复做的事情如出一辙：把相邻的自旋抱成一团当作一个新自旋，再把尺子放大。这，就是一次重整化群变换。

在这套语言下，中心极限定理变成了一句极简洁的话：高斯分布是变换 R 的不动点。R 作用在高斯上，吐出来的还是高斯；而且它是一个有吸引力的不动点——任何方差有限的分布，在反复迭代下都会被拉向它。换句话说，分布收敛到钟形曲线的过程，字面意义上就是一条重整化群流，缓缓汇入它的不动点。

那些偏离高斯的特征呢？比如分布的偏度、峰度、更高阶的累积量——在重整化群的语言里，它们是「无关方向」(irrelevant directions)：每迭代一次，它们就缩小一点，最终归零。这正是微观细节「不重要」的精确含义：它们在重整化意义下是无关的。而完全相同的机制，解释了临界点附近的普适性——水在临界点的行为、磁体在居里温度的行为，它们的临界指数只取决于维度与对称性，与分子之间究竟怎样相互作用无关。无关的，都被流冲走了。

不动点也不止一个。如果原始分布的方差是无穷大（重尾分布，比如某些金融收益或物理学里的反常扩散），求和后该除以的就不再是 √N，而是 N 的另一个幂次 N^{1/α}，于是你流向的是另一族不动点——莱维稳定分布。它们构成了不同的「普适类」，正如物理学里有伊辛普适类、海森堡普适类。

1975 年，物理学家 Jona-Lasinio 把这层联系挑明：中心极限定理不是概率论里一条孤立的奇迹，而是重整化群思想最干净、最古老的范例。你考卷直方图上那条钟形线，和流体在临界点泛起的乳白色临界乳光，背后是同一个数学观念在起作用——在一次次粗粒化之下，系统会遗忘自己的出身，流向那为数不多的、universal 的不动点。`,
  },
];

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtDate(s){
  const d=new Date(s+"T00:00:00");
  return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function excerpt(body,n){const flat=body.replace(/\s+/g," ").trim();return flat.length>n?flat.slice(0,n)+"…":flat;}
function paras(body){return body.split(/\n\n+/).map(p=>`<p>${esc(p).replace(/\n/g,"<br>")}</p>`).join("");}

let state = { view:"home", id:null };

const MASTHEAD = `
  <header class="masthead">
    <div class="brand">
      <div class="site-title"><a href="#" onclick="goHome();return false">Physics Notes</a></div>
    </div>
    <nav class="nav"><a href="quiz.html">Q →</a></nav>
  </header>`;

function render(){
  const app = document.getElementById("app");
  const sorted = [...POSTS].sort((a,b)=>b.date.localeCompare(a.date));

  if (state.view === "home") {
    app.innerHTML = `
      ${MASTHEAD}
      ${sorted.length===0 ? `<p class="empty">还没有文章，写下第一篇吧。</p>` : `
      <ul class="post-list">
        ${sorted.map(p=>`
          <li class="post-item">
            <div class="post-meta">${fmtDate(p.date)}</div>
            <h2 class="post-title"><a href="#${p.id}" onclick="openPost('${p.id}');return false">${esc(p.title)}</a></h2>
            <p class="post-excerpt">${esc(excerpt(p.body,96))}</p>
          </li>`).join("")}
      </ul>`}
      <footer>Physics Notes</footer>
    `;
  }

  else if (state.view === "post") {
    const p = POSTS.find(x=>x.id===state.id);
    if(!p){state.view="home";render();return;}
    app.innerHTML = `
      <a class="back" href="#" onclick="goHome();return false">← 返回</a>
      <article>
        <h1 class="article-title">${esc(p.title)}</h1>
        <div class="article-meta">${fmtDate(p.date)}</div>
        <div class="article-body">${paras(p.body)}</div>
        <div class="article-tags"><span class="label">标签</span>${p.tags.map(t=>esc(t)).join(" · ")}</div>
      </article>
      <footer>Physics Notes</footer>
    `;
  }
}

function openPost(id){state.view="post";state.id=id;render();window.scrollTo(0,0);}
function goHome(){state.view="home";state.id=null;render();window.scrollTo(0,0);}

render();
</script>
</body>
</html>
